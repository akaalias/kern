name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  headless-tests:
    name: Headless core tests (Linux · ASan/UBSan/LSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        # clang for sanitizer parity with local dev; libsdl2-dev provides
        # Linux-correct SDL headers (the vendored ones are macOS-configured).
        run: |
          # GitHub's Ubuntu runner ships packages.microsoft.com apt sources that
          # intermittently 403 on apt-get update; we don't use them, so drop them.
          sudo grep -rl packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f || true
          sudo apt-get update
          sudo apt-get install -y clang libsdl2-dev

      - name: Build & run unit tests
        working-directory: tests
        # SDL_CFLAGS= → resolve <SDL2/SDL.h> from the system libsdl2-dev headers.
        # On Linux, ASan enables LeakSanitizer by default.
        run: make test CC=clang SDL_CFLAGS=

  coverage:
    name: Core coverage (>= 85% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          # GitHub's Ubuntu runner ships packages.microsoft.com apt sources that
          # intermittently 403 on apt-get update; we don't use them, so drop them.
          sudo grep -rl packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f || true
          sudo apt-get update
          sudo apt-get install -y clang llvm libsdl2-dev
      - name: Measure & enforce core coverage
        working-directory: tests
        run: |
          make coverage CC=clang SDL_CFLAGS= | tee cov.txt
          pct=$(awk '/^TOTAL/ { gsub("%","",$10); print $10 }' cov.txt)
          echo "Core line coverage: ${pct}%"
          awk "BEGIN { exit !(${pct:-0} >= 85.0) }" \
            || { echo "::error::core line coverage ${pct}% is below the 85% floor"; exit 1; }

  perf-smoke:
    name: Performance smoke (Linux, 25MB corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          # GitHub's Ubuntu runner ships packages.microsoft.com apt sources that
          # intermittently 403 on apt-get update; we don't use them, so drop them.
          sudo grep -rl packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f || true
          sudo apt-get update
          sudo apt-get install -y clang libsdl2-dev
      - name: Generate corpus
        run: python3 tools/gen_prose.py 25MB test_corpus.txt
      - name: Build & run perf budgets
        working-directory: tests
        # --check fails on gross/algorithmic regressions (budgets are generous,
        # sized for 100MB, so a 25MB run has wide slack and won't flake on noise).
        run: make perf CC=clang SDL_CFLAGS= CORPUS=../test_corpus.txt PERF_ARGS=--check
