<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2c31"/>
      <stop offset="1" stop-color="#151517"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- icon body (macOS rounded square) -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#bg)"/>
  </g>
  <!-- subtle top edge highlight -->
  <rect x="100.75" y="100.75" width="822.5" height="822.5" rx="183.5" ry="183.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- lines of prose -->
  <g fill="#bcb5a8" fill-opacity="0.95">
    <rect x="300" y="353" width="424" height="52" rx="26"/>
    <rect x="300" y="486" width="360" height="52" rx="26"/>
    <rect x="300" y="619" width="244" height="52" rx="26"/>
  </g>
  <!-- the editor's caret, mid-type on the last line -->
  <rect x="580" y="593" width="32" height="104" rx="13" fill="#f0bb46"/>
</svg>
